---
- file:
    path: "{{ ansible_user_dir }}/{{ item.path }}"
    state: directory
    owner: "{{ ansible_user_id }}"
  with_filetree: "home/user/"
  when: item.state == "directory"

- file:
    src: "{{ item.src }}"
    dest: "{{ ansible_user_dir }}/{{ item.path }}"
    state: link
    force: true
    owner: "{{ ansible_user_id }}"
  with_filetree: "home/user/"
  when: item.state == "file"

- file:
    src: "{{ item.src }}"
    dest: "{{ ansible_user_dir }}/{{ item.path }}"
    state: link
    force: true
    follow: false
    owner: "{{ ansible_user_id }}"
  with_filetree: "home/user/"
  when: item.state == "link"
